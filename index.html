<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kibor Aksara Janda (Ultra Compact & Salin)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        /* Ukuran font aksara diperkecil lagi */
        .aksara-font {
            font-size: 0.95rem;
            line-height: 1;
        }
        .aksara-display {
            font-size: 1.8rem;
            line-height: 1.5;
        }
        /* Keyboard container styling */
        .keyboard-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #ffffff;
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.05);
            z-index: 50;
            transform: translateY(100%);
            transition: transform 0.2s ease-out;
            border-top: 1px solid #e2e8f0;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .keyboard-wrapper.show {
            transform: translateY(0);
        }
        /* Scrollable horizontal container */
        .keyboard-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            padding: 6px 8px;
            gap: 10px;
            max-height: 320px;
        }
        .keyboard-column {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        /* Column widths lebih sempit */
        .col-rarangken { min-width: 80px; }
        .col-main-script { min-width: 200px; }

        .key-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px 1px;
            background: white;
            border: 1px solid #f1f5f9;
            border-radius: 6px;
            min-width: 36px;
            transition: all 0.1s ease;
            cursor: pointer;
            user-select: none;
        }
        .key-btn:active {
            background: #f1f5f9;
            transform: scale(0.92);
            border-color: #6366f1;
        }
        .key-btn .sandangan-large {
            font-size: 1.15rem;
            color: #4338ca;
            font-weight: bold;
        }
        .key-btn.rarangken {
            background: #f5f3ff;
            border-color: #ede9fe;
        }
        .key-btn.swara {
            background: #f0fdf4;
            border-color: #dcfce7;
        }
        .key-btn.punctuation {
            background: #fffbeb;
            border-color: #fef3c7;
        }
        .key-btn.pamaeh-wide {
            background: #1e293b;
            color: white;
            border-color: #0f172a;
        }
        .key-label {
            font-size: 6px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            margin-top: 1px;
        }
        .key-btn.pamaeh-wide .key-label { color: #94a3b8; }

        /* Custom scrollbar */
        .keyboard-scroll::-webkit-scrollbar {
            height: 3px;
        }
        .keyboard-scroll::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        textarea:focus {
            outline: none;
            border-color: #6366f1;
        }
    </style>
</head>
<body class="pb-64">

    <!-- Navigasi -->
    <nav class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 px-4 py-2 flex justify-between items-center">
        <div>
            <h1 class="text-base font-extrabold text-slate-800 leading-tight">Aksara <span class="text-indigo-600">Janda</span></h1>
            <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Hybrid Keyboard v2.7</p>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[9px] font-bold text-slate-500 uppercase">Kibor</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="keyboardToggle" class="sr-only peer" checked onchange="toggleKeyboard()">
                <div class="w-8 h-4 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-indigo-600"></div>
            </label>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto p-3 space-y-3">
        <!-- Text Area Utama -->
        <div class="relative">
            <textarea id="output" 
                inputmode="none"
                class="w-full p-4 bg-white border border-slate-200 rounded-3xl shadow-sm aksara-display text-slate-900 min-h-[300px] md:min-h-[350px] transition-all"
                placeholder="Mangga ketik nganggo kibor di handap..."></textarea>
            
            <!-- Tombol Hapus Cepat -->
            <div class="absolute bottom-4 right-4">
                <button onclick="clearText()" class="p-2 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition-colors shadow-sm" title="Hapus Semua">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Keyboard Horizontal Wrapper -->
    <div id="keyboardContainer" class="keyboard-wrapper show">
        <!-- Control Bar -->
        <div class="flex items-center justify-between px-3 py-1 bg-slate-50 border-b border-slate-100">
            <div class="flex gap-1.5">
                <button onclick="insertChar(' ')" class="px-3 py-1 bg-white border border-slate-200 rounded text-[8px] font-bold text-slate-500 hover:bg-slate-50">SPASI</button>
                <button onclick="insertChar('\n')" class="px-3 py-1 bg-white border border-slate-200 rounded text-[8px] font-bold text-slate-500 hover:bg-slate-50">ENTER</button>
                <!-- Tombol Salin Baru -->
                <button onclick="copyToClipboard()" class="px-3 py-1 bg-indigo-600 text-white rounded text-[8px] font-black uppercase tracking-widest shadow-sm hover:bg-indigo-700 active:scale-95 transition-all flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                    SALIN
                </button>
            </div>
            <button onclick="backspace()" class="px-3 py-1 bg-orange-50 text-orange-600 border border-orange-200 rounded text-[8px] font-black flex items-center gap-1 hover:bg-orange-100 active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                HAPUS
            </button>
        </div>

        <!-- Scrollable Keyboard -->
        <div class="keyboard-scroll" id="keyboardContent">
            
            <!-- Kolom 1: Rarangken Sunda -->
            <div class="keyboard-column col-rarangken">
                <span class="text-[7px] font-black text-indigo-400 uppercase text-center">Rarangken</span>
                <div class="grid grid-cols-2 gap-1">
                    <button onclick="insertChar('\u1BA4')" class="key-btn rarangken"><span class="sandangan-large">ᮄ</span><span class="key-label">i</span></button>
                    <button onclick="insertChar('\u1BA5')" class="key-btn rarangken"><span class="sandangan-large">ᮅ</span><span class="key-label">u</span></button>
                    <button onclick="insertChar('\u1BA8')" class="key-btn rarangken"><span class="sandangan-large">ᮈ</span><span class="key-label">e</span></button>
                    <button onclick="insertChar('\u1BA6')" class="key-btn rarangken"><span class="sandangan-large">ᮆ</span><span class="key-label">é</span></button>
                    <button onclick="insertChar('\u1BA9')" class="key-btn rarangken"><span class="sandangan-large">ᮉ</span><span class="key-label">eu</span></button>
                    <button onclick="insertChar('\u1BA7')" class="key-btn rarangken"><span class="sandangan-large">ᮇ</span><span class="key-label">o</span></button>
                    <button onclick="insertChar('\u1B80')" class="key-btn rarangken"><span class="sandangan-large">ᮀ</span><span class="key-label">+ng</span></button>
                    <button onclick="insertChar('\u1B81')" class="key-btn rarangken"><span class="sandangan-large">ᮁ</span><span class="key-label">+r</span></button>
                    <button onclick="insertChar('\u1B82')" class="key-btn rarangken"><span class="sandangan-large">ᮂ</span><span class="key-label">+h</span></button>
                    <button onclick="insertChar('\u1BA1')" class="key-btn rarangken"><span class="sandangan-large">ᮡ</span><span class="key-label">+ya</span></button>
                    <button onclick="insertChar('\u1BA2')" class="key-btn rarangken"><span class="sandangan-large">ᮢ</span><span class="key-label">+ra</span></button>
                    <button onclick="insertChar('\u1BA3')" class="key-btn rarangken"><span class="sandangan-large">ᮣ</span><span class="key-label">+la</span></button>
                </div>
            </div>

            <!-- Kolom Utama: Carakan -> Swara -> Pamaeh -> Tanda Baca -->
            <div class="keyboard-column col-main-script">
                <span class="text-[7px] font-black text-slate-400 uppercase text-center">Carakan & Tanda Baca</span>
                <div class="grid grid-cols-5 gap-1">
                    <!-- CARAKAN (20 Huruf) -->
                    <button onclick="insertChar('ꦲ')" class="key-btn"><span class="aksara-font">ꦲ</span><span class="key-label">Ha</span></button>
                    <button onclick="insertChar('ꦤ')" class="key-btn"><span class="aksara-font">ꦤ</span><span class="key-label">Na</span></button>
                    <button onclick="insertChar('ꦕ')" class="key-btn"><span class="aksara-font">ꦕ</span><span class="key-label">Ca</span></button>
                    <button onclick="insertChar('ꦫ')" class="key-btn"><span class="aksara-font">ꦫ</span><span class="key-label">Ra</span></button>
                    <button onclick="insertChar('ꦏ')" class="key-btn"><span class="aksara-font">ꦏ</span><span class="key-label">Ka</span></button>
                    <button onclick="insertChar('ꦢ')" class="key-btn"><span class="aksara-font">ꦢ</span><span class="key-label">Da</span></button>
                    <button onclick="insertChar('ꦠ')" class="key-btn"><span class="aksara-font">ꦠ</span><span class="key-label">Ta</span></button>
                    <button onclick="insertChar('ꦱ')" class="key-btn"><span class="aksara-font">ꦱ</span><span class="key-label">Sa</span></button>
                    <button onclick="insertChar('ꦮ')" class="key-btn"><span class="aksara-font">ꦮ</span><span class="key-label">Wa</span></button>
                    <button onclick="insertChar('ꦭ')" class="key-btn"><span class="aksara-font">ꦭ</span><span class="key-label">La</span></button>
                    <button onclick="insertChar('ꦥ')" class="key-btn"><span class="aksara-font">ꦥ</span><span class="key-label">Pa</span></button>
                    <button onclick="insertChar('ꦝ')" class="key-btn"><span class="aksara-font">ꦝ</span><span class="key-label">Dha</span></button>
                    <button onclick="insertChar('ꦗ')" class="key-btn"><span class="aksara-font">ꦗ</span><span class="key-label">Ja</span></button>
                    <button onclick="insertChar('ꦪ')" class="key-btn"><span class="aksara-font">ꦪ</span><span class="key-label">Ya</span></button>
                    <button onclick="insertChar('ꦚ')" class="key-btn"><span class="aksara-font">ꦚ</span><span class="key-label">Nya</span></button>
                    <button onclick="insertChar('ꦩ')" class="key-btn"><span class="aksara-font">ꦩ</span><span class="key-label">Ma</span></button>
                    <button onclick="insertChar('ꦒ')" class="key-btn"><span class="aksara-font">ꦒ</span><span class="key-label">Ga</span></button>
                    <button onclick="insertChar('ꦧ')" class="key-btn"><span class="aksara-font">ꦧ</span><span class="key-label">Ba</span></button>
                    <button onclick="insertChar('ꦛ')" class="key-btn"><span class="aksara-font">ꦛ</span><span class="key-label">Tha</span></button>
                    <button onclick="insertChar('ꦔ')" class="key-btn"><span class="aksara-font">ꦔ</span><span class="key-label">Nga</span></button>

                    <!-- SWARA -->
                    <button onclick="insertChar('ꦄ')" class="key-btn swara"><span class="aksara-font">ꦄ</span><span class="key-label">A</span></button>
                    <button onclick="insertChar('ꦇ')" class="key-btn swara"><span class="aksara-font">ꦇ</span><span class="key-label">I</span></button>
                    <button onclick="insertChar('ꦈ')" class="key-btn swara"><span class="aksara-font">ꦈ</span><span class="key-label">U</span></button>
                    <button onclick="insertChar('ꦌ')" class="key-btn swara"><span class="aksara-font">ꦌ</span><span class="key-label">E</span></button>
                    <button onclick="insertChar('ꦎ')" class="key-btn swara"><span class="aksara-font">ꦎ</span><span class="key-label">O</span></button>

                    <!-- PAMAEH (Lebar) -->
                    <button onclick="insertChar('\u1BAA')" class="key-btn pamaeh-wide col-span-5 flex-row gap-2 mt-1 py-1">
                        <span class="sandangan-large text-indigo-400">᮪</span>
                        <span class="text-[9px] font-bold tracking-widest uppercase">Mati / Pamaéh</span>
                    </button>

                    <!-- TANDA BACA -->
                    <button onclick="insertChar('꧈')" class="key-btn punctuation"><span class="aksara-font">꧈</span><span class="key-label">,</span></button>
                    <button onclick="insertChar('꧉')" class="key-btn punctuation"><span class="aksara-font">꧉</span><span class="key-label">.</span></button>
                    <button onclick="insertChar('꧋')" class="key-btn punctuation"><span class="aksara-font">꧋</span><span class="key-label">¶</span></button>
                    <button onclick="insertChar('꧊')" class="key-btn punctuation"><span class="aksara-font">꧊</span><span class="key-label">:</span></button>
                    <button onclick="insertChar('-')" class="key-btn punctuation"><span class="font-bold text-[10px]">-</span><span class="key-label">-</span></button>
                    <button onclick="insertChar('?')" class="key-btn punctuation"><span class="font-bold text-[10px]">?</span><span class="key-label">?</span></button>
                    <button onclick="insertChar('!')" class="key-btn punctuation"><span class="font-bold text-[10px]">!</span><span class="key-label">!</span></button>
                    <button onclick="insertChar(':')" class="key-btn punctuation"><span class="font-bold text-[10px]">:</span><span class="key-label">:</span></button>
                    <button onclick="insertChar('(')" class="key-btn punctuation"><span class="font-bold text-[10px]">(</span><span class="key-label">(</span></button>
                    <button onclick="insertChar(')')" class="key-btn punctuation"><span class="font-bold text-[10px]">)</span><span class="key-label">)</span></button>
                </div>
            </div>

        </div>
    </div>

    <!-- Toast UI -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-4 py-1.5 rounded-full text-[9px] font-bold opacity-0 transition-all pointer-events-none transform -translate-y-4 shadow-lg z-[60]">
        BERHASIL DISALIN
    </div>

    <script>
        const output = document.getElementById('output');
        const keyboard = document.getElementById('keyboardContainer');
        const toast = document.getElementById('toast');

        function insertChar(char) {
            const start = output.selectionStart;
            const end = output.selectionEnd;
            const text = output.value;
            
            output.value = text.substring(0, start) + char + text.substring(end);
            output.selectionStart = output.selectionEnd = start + char.length;
            output.focus();
        }

        function backspace() {
            const start = output.selectionStart;
            const end = output.selectionEnd;
            const text = output.value;

            if (start !== end) {
                output.value = text.substring(0, start) + text.substring(end);
                output.selectionStart = output.selectionEnd = start;
            } else if (start > 0) {
                const textBefore = text.substring(0, start);
                const textAfter = text.substring(start);
                const charsBefore = Array.from(textBefore);
                charsBefore.pop();
                const newTextBefore = charsBefore.join('');
                output.value = newTextBefore + textAfter;
                output.selectionStart = output.selectionEnd = newTextBefore.length;
            }
            output.focus();
        }

        function clearText() {
            output.value = '';
            output.focus();
        }

        function toggleKeyboard() {
            const isChecked = document.getElementById('keyboardToggle').checked;
            if (isChecked) {
                keyboard.classList.add('show');
                document.body.style.paddingBottom = "400px";
            } else {
                keyboard.classList.remove('show');
                document.body.style.paddingBottom = "20px";
            }
        }

        function copyToClipboard() {
            if (!output.value) return;
            output.select();
            // Use standard command as navigator.clipboard might be restricted in some iframes
            document.execCommand('copy');
            
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -1rem)';
            }, 2000);
        }
        
        toggleKeyboard();
    </script>
</body>
</html>
